<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Cart</title>
  <link rel="stylesheet" href="./cart.css" />
</head>
<body>
  <header class="topbar">
    <a href="./collection.html" class="brand">MedTech</a>
  </header>

  <main class="cart-page">
    <section class="cart-layout">
      <div class="cart-main">
        <div class="section-head">
          <p class="eyebrow">Your Cart</p>
          <h1>Shopping Summary</h1>
        </div>

        <div id="cart-items" class="cart-items"></div>
        <div id="empty-state" class="empty-state" style="display:none;">
          Your cart is empty. <a href="./collection.html">Go to Collection</a>
        </div>
      </div>

      <aside class="summary-card">
        <h2>Order Summary</h2>
        <div class="summary-row">
          <span>Items</span>
          <span id="summary-items">0</span>
        </div>
        <div class="summary-row">
          <span>Subtotal</span>
          <span id="summary-subtotal">₹0</span>
        </div>
        <div class="summary-row">
          <span>Delivery</span>
          <span id="summary-delivery">₹99</span>
        </div>
        <div class="summary-row total">
          <span>Total</span>
          <span id="summary-total">₹0</span>
        </div>

        <a href="./checkout.html" class="checkout-btn" id="checkout-btn">Buy Now</a>
      </aside>
    </section>
  </main>

  <script src="./cart.js"></script>
</body>
</html>
